# GitLab CI/CD for TradeBlocks
# Replaces: ci.yml, release.yml, beta-release.yml, update-treasury-rates.yml

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - test
  - publish
  - release

variables:
  NODE_VERSION: "20"

# ----- Shared Templates -----

.node-setup:
  image: node:${NODE_VERSION}
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

# ==========================================
# CI — runs on every push and MR
# ==========================================

frontend:lint-build:
  extends: .node-setup
  stage: test
  script:
    - npm run lint
    - npm run build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

mcp-server:build-test:
  extends: .node-setup
  stage: test
  script:
    - npm run build -w packages/mcp-server
    - npm test -w packages/mcp-server
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

# ==========================================
# Release — on master push when MCP paths change
# ==========================================

.release-rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE != "merge_request_event"
      changes:
        - packages/mcp-server/**/*
        - packages/agent-skills/**/*
        - lib/**/*
    # Also allow manual trigger
    - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE_TYPE == "stable"

release:build:
  extends: .node-setup
  stage: test
  rules: !reference [.release-rules, rules]
  script:
    - npm run lint
    - npm run build -w packages/mcp-server
    - |
      VERSION=$(node -p "require('./packages/mcp-server/package.json').version")
      echo "VERSION=$VERSION" >> build.env
      if echo "$VERSION" | grep -qE '-(alpha|beta|rc)\.'; then
        echo "Version '$VERSION' is a pre-release. Use beta release instead."
        exit 1
      fi
    - npm run mcpb:pack -w packages/mcp-server
  artifacts:
    paths:
      - packages/mcp-server/*.mcpb
    reports:
      dotenv: build.env

publish:npm:
  extends: .node-setup
  stage: publish
  needs: ["release:build"]
  rules: !reference [.release-rules, rules]
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    - |
      if npm view tradeblocks-mcp@$VERSION version 2>/dev/null; then
        echo "Version $VERSION already published, skipping"
        exit 0
      fi
    - npm run build -w packages/mcp-server
    - npm publish -w packages/mcp-server --access public --provenance
  environment:
    name: npm
    url: https://www.npmjs.com/package/tradeblocks-mcp

publish:docker:
  stage: publish
  image: docker:24
  services:
    - docker:24-dind
  needs: ["release:build"]
  rules: !reference [.release-rules, rules]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Login to both registries
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_TOKEN
  script:
    # Need node to build MCP server before Docker build
    - apk add --no-cache nodejs npm
    - npm ci
    - npm run build -w packages/mcp-server
    - |
      docker build \
        --label "org.opencontainers.image.title=tradeblocks-mcp" \
        --label "org.opencontainers.image.version=$VERSION" \
        --label "org.opencontainers.image.source=$CI_PROJECT_URL" \
        -t $CI_REGISTRY_IMAGE/tradeblocks-mcp:$VERSION \
        -t $CI_REGISTRY_IMAGE/tradeblocks-mcp:latest \
        -t romeo345/tradeblocks-mcp:$VERSION \
        -t romeo345/tradeblocks-mcp:latest \
        packages/mcp-server
    # Push to GitLab Container Registry
    - docker push $CI_REGISTRY_IMAGE/tradeblocks-mcp:$VERSION
    - docker push $CI_REGISTRY_IMAGE/tradeblocks-mcp:latest
    # Push to Docker Hub
    - docker push romeo345/tradeblocks-mcp:$VERSION
    - docker push romeo345/tradeblocks-mcp:latest

release:create:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: release:build
      artifacts: true
    - job: publish:npm
    - job: publish:docker
  rules: !reference [.release-rules, rules]
  script:
    - echo "Creating release v$VERSION"
  release:
    tag_name: v$VERSION
    name: v$VERSION
    description: |
      ## Installation

      ### Claude Desktop (One-Click)
      Download `tradeblocks-*.mcpb` from the package registry.

      ### npm
      ```bash
      npx tradeblocks-mcp ~/path/to/backtests
      ```

      ### Docker
      ```bash
      docker pull $CI_REGISTRY_IMAGE/tradeblocks-mcp:$VERSION
      docker run -p 3100:3100 -v ./data:/data --env-file .env $CI_REGISTRY_IMAGE/tradeblocks-mcp:$VERSION
      ```

      ### From Source
      ```bash
      git clone https://gitlab.com/davidromeo/tradeblocks
      cd tradeblocks && npm install && npm run build:mcp
      ```
    assets:
      links:
        - name: tradeblocks-mcp-${VERSION}.mcpb
          url: ${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/packages/mcp-server/tradeblocks-mcp-${VERSION}.mcpb

# ==========================================
# Beta Release — manual trigger only
# ==========================================

.beta-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE_TYPE == "beta"

beta:build:
  extends: .node-setup
  stage: test
  rules: !reference [.beta-rules, rules]
  script:
    - |
      VERSION=$(node -p "require('./packages/mcp-server/package.json').version")
      echo "VERSION=$VERSION" >> build.env
      if ! echo "$VERSION" | grep -qE '-beta\.'; then
        echo "Version '$VERSION' is not a beta. Expected format: X.Y.Z-beta.N"
        exit 1
      fi
    - npm run lint
    - npm run build -w packages/mcp-server
    - npm run mcpb:pack -w packages/mcp-server
    - npm pack -w packages/mcp-server --pack-destination ./packages/mcp-server
  artifacts:
    paths:
      - packages/mcp-server/*.mcpb
      - packages/mcp-server/*.tgz
    reports:
      dotenv: build.env

beta:publish-npm:
  extends: .node-setup
  stage: publish
  needs: ["beta:build"]
  rules: !reference [.beta-rules, rules]
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    - |
      if npm view tradeblocks-mcp@$VERSION version 2>/dev/null; then
        echo "Version $VERSION already published, skipping"
        exit 0
      fi
    - npm run build -w packages/mcp-server
    - npm publish -w packages/mcp-server --tag beta --access public --provenance

beta:publish-docker:
  stage: publish
  image: docker:24
  services:
    - docker:24-dind
  needs: ["beta:build"]
  rules: !reference [.beta-rules, rules]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_TOKEN
  script:
    - apk add --no-cache nodejs npm
    - npm ci
    - npm run build -w packages/mcp-server
    - |
      docker build \
        --label "org.opencontainers.image.title=tradeblocks-mcp" \
        --label "org.opencontainers.image.version=$VERSION" \
        --label "org.opencontainers.image.source=$CI_PROJECT_URL" \
        -t $CI_REGISTRY_IMAGE/tradeblocks-mcp:$VERSION \
        -t romeo345/tradeblocks-mcp:$VERSION \
        packages/mcp-server
    - docker push $CI_REGISTRY_IMAGE/tradeblocks-mcp:$VERSION
    - docker push romeo345/tradeblocks-mcp:$VERSION

beta:release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: beta:build
      artifacts: true
    - job: beta:publish-npm
    - job: beta:publish-docker
  rules: !reference [.beta-rules, rules]
  script:
    - echo "Creating beta release v$VERSION"
  release:
    tag_name: v$VERSION
    name: "v$VERSION (Beta)"
    description: |
      ## Beta Release

      This is a **pre-release** for testing. Use `tradeblocks-mcp@latest` for the stable version.

      ### Install
      ```bash
      npx tradeblocks-mcp@beta ~/path/to/backtests
      ```

      ### Docker
      ```bash
      docker pull $CI_REGISTRY_IMAGE/tradeblocks-mcp:$VERSION
      ```

      ### Revert to stable
      ```bash
      npm install -g tradeblocks-mcp@latest
      ```

# ==========================================
# Scheduled: Treasury Rate Updates (weekly)
# ==========================================

treasury:update:
  extends: .node-setup
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - |
      # Get the last date in the file
      LAST_DATE=$(grep -oE '"[0-9]{4}-[0-9]{2}-[0-9]{2}"' packages/lib/data/treasury-rates.ts | tail -1 | tr -d '"')
      START_DATE=$(date -d "$LAST_DATE + 1 day" +%Y-%m-%d)
      END_DATE=$(date +%Y-%m-%d)
      echo "Fetching rates from $START_DATE to $END_DATE"

      # Fetch from FRED
      curl -s "https://fred.stlouisfed.org/graph/fredgraph.csv?id=DTB3&cosd=${START_DATE}&coed=${END_DATE}" -o new_rates.csv

      LINE_COUNT=$(wc -l < new_rates.csv)
      if [ "$LINE_COUNT" -le 1 ]; then
        echo "No new rates available"
        exit 0
      fi

      # Filter to only dates >= START_DATE
      head -1 new_rates.csv > filtered_rates.csv
      awk -F',' -v start="$START_DATE" 'NR>1 && $1 >= start' new_rates.csv >> filtered_rates.csv
      mv filtered_rates.csv new_rates.csv

      LINE_COUNT=$(wc -l < new_rates.csv)
      if [ "$LINE_COUNT" -le 1 ]; then
        echo "No new rates in date range"
        exit 0
      fi

      # Convert CSV to TypeScript entries
      tail -n +2 new_rates.csv | while IFS=',' read -r date rate; do
        if [ "$rate" != "." ] && [ -n "$rate" ] && [ "$rate" != "" ]; then
          echo "  \"$date\": $rate,"
        fi
      done > new_entries.txt

      if [ ! -s new_entries.txt ]; then
        echo "No valid rate entries (all holidays)"
        exit 0
      fi

      # Insert before closing brace
      CLOSE_LINE=$(grep -n '^};$' packages/lib/data/treasury-rates.ts | cut -d: -f1)
      head -n $((CLOSE_LINE - 1)) packages/lib/data/treasury-rates.ts > temp_rates.ts
      cat new_entries.txt >> temp_rates.ts
      echo "};" >> temp_rates.ts
      mv temp_rates.ts packages/lib/data/treasury-rates.ts

      # Verify with tests
      npm test -- tests/unit/risk-free-rate.test.ts

      # Commit and push
      if git diff --quiet packages/lib/data/treasury-rates.ts; then
        echo "No changes to commit"
        exit 0
      fi

      git config user.name "gitlab-ci[bot]"
      git config user.email "gitlab-ci[bot]@gitlab.com"
      git remote set-url origin "https://oauth2:${GITLAB_PUSH_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
      git add packages/lib/data/treasury-rates.ts
      LAST_NEW_DATE=$(grep -oE '"[0-9]{4}-[0-9]{2}-[0-9]{2}"' packages/lib/data/treasury-rates.ts | tail -1 | tr -d '"')
      git commit -m "chore: update treasury rates through ${LAST_NEW_DATE}"
      git push origin HEAD:master
